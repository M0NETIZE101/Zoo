<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Magic Window Zoo</title>
    
    <link rel="stylesheet" href="css/style.css" />
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <!-- ===== LOADING ===== -->
    <div id="loading">
        <div class="spinner"></div>
        <p id="loading-text">Loading Magic Window Zoo...</p>
        <p class="sub-text">Preparing your wildlife adventure</p>
    </div>

    <!-- ===== START SCREEN ===== -->
    <div id="start-screen">
        <div class="card">
            <div class="logo">🦁</div>
            <h1>Magic Window Zoo</h1>
            <p>Look through your device into a living zoo</p>
            
            <button id="start-btn">Enter the Zoo</button>
            <p id="status-text" class="status">Tap to begin</p>
        </div>
    </div>

    <!-- ===== GAME CONTAINER ===== -->
    <div id="game-container"></div>

    <!-- ===== UI OVERLAY ===== -->
    <div id="ui-overlay" style="display: none;">
        <div id="crosshair"></div>

        <div id="top-bar">
            <div id="collection-count">
                <span>🐾</span>
                <span id="animal-count">0</span>
                <span id="total-count">/ 0</span>
            </div>
            <div id="current-animal">
                <span id="animal-name">Looking around...</span>
            </div>
        </div>

        <div id="discovery-popup" style="display: none;">
            <div class="discovery-card">
                <h2 id="discovery-name">Animal</h2>
                <p id="discovery-fact">Fact goes here</p>
                <div class="discovery-progress">
                    <div class="progress-ring"></div>
                    <span id="discovery-timer">3s</span>
                </div>
            </div>
        </div>

        <div id="bottom-controls">
            <button id="camera-btn" class="control-btn" title="Take Photo">
                <span class="icon">📸</span>
                <span class="label">Photo</span>
            </button>
            <button id="reset-btn" class="control-btn" title="Reset View">
                <span class="icon">🔄</span>
                <span class="label">Reset</span>
            </button>
        </div>

        <div id="guidance">
            <span id="guidance-icon" class="icon">📱</span>
            <span id="guidance-text" class="text">Move to look around</span>
        </div>
    </div>

    <div id="toast"></div>

    <div id="photo-preview" style="display: none;">
        <div class="preview-card">
            <img id="captured-image" src="" alt="Zoo Photo" />
            <div class="preview-actions">
                <button id="preview-close-btn">Close</button>
                <button id="preview-download-btn">Save</button>
            </div>
        </div>
    </div>

    <!-- ON-SCREEN CONSOLE FOR MOBILE DEBUGGING (DELETE BEFORE PUBLISHING) -->
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>

    <script type="module" src="js/main.js"></script>
</body>
</html>
